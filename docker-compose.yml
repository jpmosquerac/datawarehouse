services:

  # ── Base de datos: metadata_repository + datawarehouse ──────────────────
  #
  #  Los scripts en init-db/ se ejecutan en orden alfabético al crear el
  #  contenedor por primera vez:
  #    01  schema.sql              → DDL repositorio de metadatos (capas 1-3)
  #    02  schema_dw_extension.sql → DDL extensión repositorio (capas 4-5)
  #    03  create_datawarehouse.sh → crea BD datawarehouse + aplica DDL del DW
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: modelado_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       metadata_repository
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../metadata_repo/schema.sql:/docker-entrypoint-initdb.d/01_schema_metadata.sql
      - ../metadata_repo/schema_dw_extension.sql:/docker-entrypoint-initdb.d/02_schema_dw_extension.sql
      - ./init-db/03_create_datawarehouse.sh:/docker-entrypoint-initdb.d/03_create_datawarehouse.sh
      - ./schema/datawarehouse.sql:/docker-initdb-sql/datawarehouse.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d metadata_repository"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ETL 1: descubrimiento de metadatos (Entrega 1) ──────────────────────
  etl_metadata:
    build: ../metadata_repo
    container_name: etl_metadata
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REPO_HOST:        postgres
      REPO_PORT:        5432
      REPO_DB:          metadata_repository
      REPO_USER:        admin
      REPO_PASSWORD:    admin123
      DATA_SOURCES_DIR: /app/data_sources
    volumes:
      - ../metadata_repo/data_sources:/app/data_sources:ro
    profiles: [etl]

  # ── ETL 2: carga del almacén de datos (Entrega 2) ───────────────────────
  etl_dw:
    build: .
    container_name: etl_dw
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DW_HOST:          postgres
      DW_PORT:          5432
      DW_DB:            datawarehouse
      DW_USER:          admin
      DW_PASSWORD:      admin123
      DATA_SOURCES_DIR: /app/data_sources
    volumes:
      - ../metadata_repo/data_sources:/app/data_sources:ro
      - ./stg:/app/stg
    profiles: [etl]

  # ── ETL 3: extensión del repositorio de metadatos (Entrega 2) ───────────
  etl_metadata_ext:
    build: ../metadata_repo
    container_name: etl_metadata_ext
    command: python etl_dw_metadata.py
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REPO_HOST:      postgres
      REPO_PORT:      5432
      REPO_DB:        metadata_repository
      REPO_USER:      admin
      REPO_PASSWORD:  admin123
      DW_SCHEMA_FILE: /app/dw_schema/datawarehouse.sql
    volumes:
      - ./schema:/app/dw_schema:ro
    profiles: [etl]

volumes:
  postgres_data:
